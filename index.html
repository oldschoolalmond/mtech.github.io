<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Platform</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at center, #131722 0%, #0c0f16 100%);
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.bg-trading-grid {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
        linear-gradient(rgba(0,255,136,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
}

.main-container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 380px;
    padding: 0 16px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.arrow-top-right {
    position: fixed;
    top: 25px;
    right: 12px;
    font-size: 50px;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0,255,136,0.7);
    animation: bounceArrow 0.8s infinite alternate;
    z-index: 10;
}

.instruction-banner {
    width: 100%;
    background: rgba(20,26,40,0.95);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 10px;
    padding: 16px 10px;
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    box-sizing: border-box;
}

.highlight {
    color: #00ff88;
}

.video-box-square {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
}

.video-box-square video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@keyframes bounceArrow {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
}
</style>
</head>

<body>

<div class="bg-trading-grid"></div>

<div class="arrow-top-right">⬆</div>

<div class="main-container">

    <div class="instruction-banner">
        Klik <span class="highlight">"Buka di browser"</span> untuk bergabung.
    </div>

    <div class="video-box-square">
        <video autoplay muted loop playsinline>
            <source src="ayo.mp4" type="video/mp4">
        </video>
    </div>

</div>

<script>
const TG_LINK = "https://t.me/+f_AJH2Nq5nhjZTdh";
const TG_DEEP_LINK = "tg://join?invite=f_AJH2Nq5nhjZTdh";

let redirected = false;

function processRedirect() {
    if (redirected) return;
    redirected = true;

    try {
        // Пытаемся открыть приложение Telegram
        window.location.href = TG_DEEP_LINK;

        // Если не получилось — открываем обычную ссылку
        setTimeout(() => {
            window.location.href = TG_LINK;
        }, 800);

    } catch (e) {
        window.location.href = TG_LINK;
    }
}

// Клик по любому месту страницы
document.body.addEventListener("click", processRedirect);
document.body.addEventListener("touchstart", processRedirect);

// Автопереход через 6 секунд
setTimeout(processRedirect, 6000);
</script>

</body>
</html>
