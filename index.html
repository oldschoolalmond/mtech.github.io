<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Platform</title>

<style>
html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at center, #131722 0%, #0c0f16 100%);
    color: #fff;
}

.bg-trading-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,136,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
}

.main-container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 380px;
    height: 100vh;
    margin: 0 auto;
    padding: 0 16px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.arrow-top-right {
    position: fixed;
    top: 25px;
    right: 12px;
    font-size: 50px;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0,255,136,0.8);
    animation: bounceArrow 0.8s infinite alternate;
    z-index: 10;
}

.instruction-banner {
    width: 100%;
    background: rgba(20,26,40,0.95);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 10px;
    padding: 16px 10px;
    margin-bottom: 25px;

    text-align: center;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.3;

    box-sizing: border-box;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.highlight {
    color: #00ff88;
}

.video-box-square {
    width: 100%;
    aspect-ratio: 1 / 1;

    overflow: hidden;
    border-radius: 16px;

    background: #000;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
}

.video-box-square img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

@keyframes bounceArrow {
    from { transform: translateY(0); }
    to { transform: translateY(-12px); }
}
</style>
</head>

<body>

<div class="bg-trading-grid"></div>
<div class="arrow-top-right">⬆</div>

<div class="main-container">

    <div class="instruction-banner">
        Klik <span class="highlight">"Buka di browser"</span> untuk bergabung.
    </div>

    <div class="video-box-square">
        <img id="gif" src="./ayo.gif?v=1" alt="Animation">
    </div>

</div>

<script>
// Новая ссылка установлена здесь:
const TG_LINK = "https://t.me/mpls19";

function isTikTokWebView() {
    const ua = navigator.userAgent.toLowerCase();

    return (
        ua.includes("tiktok") ||
        ua.includes("musical_ly") ||
        ua.includes("bytedance")
    );
}

// 🔥 Принудительный перезапуск GIF
function restartGif() {
    const gif = document.getElementById("gif");
    const src = gif.src;
    gif.src = "";
    gif.src = src;
}

window.addEventListener("load", () => {

    // перезапуск GIF сразу после загрузки
    restartGif();

    // редирект логика
    if (!isTikTokWebView()) {
        window.location.replace(TG_LINK);
    }

});
</script>

</body>
</html>
